; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
build_flags = 
	-DCORE_DEBUG_LEVEL=0
lib_deps = 
	https://github.com/sparkfun/SparkFun_BNO080_Arduino_Library.git
	adafruit/Adafruit BMP280 Library@^3.0.0
	adafruit/Adafruit PWM Servo Driver Library@^3.0.3

[env:esp32dev_calibration]
extends = env:esp32dev
build_src_filter = +<servo.cpp> +<../calibration/servo_calibration.cpp>
